name: Habit Reminder Cron

on:
  schedule:
    - cron: '0 * * * *'  # Every hour at :00
  workflow_dispatch:       # Manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "ERROR: APP_URL secret is not set!"
            echo "Go to: Settings > Secrets and variables > Actions"
            echo "Add APP_URL = https://habbit-navy.vercel.app"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "ERROR: CRON_SECRET secret is not set!"
            exit 1
          fi
          echo "Secrets validated. Calling: ${{ secrets.APP_URL }}/api/cron/reminders"

      - name: Trigger reminder endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            -X POST "${{ secrets.APP_URL }}/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Cron job failed with status $response"
            exit 1
          fi
          echo "Cron job completed successfully!"
